<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <filter id="concrete">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncR type="linear" slope="0.18" intercept="0.78"/>
      <feFuncG type="linear" slope="0.18" intercept="0.78"/>
      <feFuncB type="linear" slope="0.18" intercept="0.78"/>
    </feComponentTransfer>
  </filter>
  <rect width="200" height="200" filter="url(#concrete)"/>
</svg>
