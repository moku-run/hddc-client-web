<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <filter id="fabric">
    <feTurbulence type="turbulence" baseFrequency="0.15 0.15" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncR type="linear" slope="0.1" intercept="0.88"/>
      <feFuncG type="linear" slope="0.1" intercept="0.87"/>
      <feFuncB type="linear" slope="0.1" intercept="0.86"/>
    </feComponentTransfer>
  </filter>
  <rect width="200" height="200" filter="url(#fabric)"/>
</svg>
