<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <filter id="paper">
    <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncR type="linear" slope="0.15" intercept="0.85"/>
      <feFuncG type="linear" slope="0.15" intercept="0.85"/>
      <feFuncB type="linear" slope="0.15" intercept="0.85"/>
    </feComponentTransfer>
  </filter>
  <rect width="200" height="200" filter="url(#paper)"/>
</svg>
