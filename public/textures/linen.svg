<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <filter id="linen">
    <feTurbulence type="turbulence" baseFrequency="0.3 0.05" numOctaves="2" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncR type="linear" slope="0.12" intercept="0.88"/>
      <feFuncG type="linear" slope="0.12" intercept="0.87"/>
      <feFuncB type="linear" slope="0.12" intercept="0.85"/>
    </feComponentTransfer>
  </filter>
  <rect width="200" height="200" filter="url(#linen)"/>
</svg>
